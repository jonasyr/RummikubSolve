events {}

http {
  server {
    listen 80;

    # Limit request body size explicitly (Rummikub payloads are tiny; this
    # makes the constraint visible rather than relying on the nginx default).
    client_max_body_size 1m;

    # Proxy API and health endpoints to the backend container
    location /api/ {
      proxy_pass         http://backend:8000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /health {
      proxy_pass         http://backend:8000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy everything else (static assets, pages, HMR) to the Next.js container
    location / {
      proxy_pass             http://frontend:3000;
      proxy_set_header       Host $host;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_set_header       Upgrade $http_upgrade;
      proxy_set_header       Connection "upgrade";
    }
  }
}
