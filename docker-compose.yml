version: "3.9"

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - "*.pyc"

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string → relative URLs (/api/solve) so nginx can proxy correctly.
        # For local development without Docker use NEXT_PUBLIC_API_URL=http://localhost:8000.
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
