services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    healthcheck:
      # python:3.12-slim has no curl/wget — use urllib from the stdlib instead.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # No host-port binding — backend is only reachable via the nginx proxy
    # at http://localhost/api/*. Removing the binding prevents direct LAN
    # access that would bypass CORS headers and nginx request buffering.
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    volumes:
      # Persist the pre-generated puzzle pool (SQLite DB) across container rebuilds.
      - puzzle_data:/app/data
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - "*.pyc"

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string → relative URLs (/api/solve) so nginx can proxy correctly.
        # For local development without Docker use NEXT_PUBLIC_API_URL=http://localhost:8000.
        NEXT_PUBLIC_API_URL: ""
    # No host-port binding — frontend is served through nginx on port 80.
    healthcheck:
      # node:20-alpine has no curl — use wget (bundled with Alpine) instead.
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  # Named volume so the SQLite puzzle pool DB survives container rebuilds.
  puzzle_data:
