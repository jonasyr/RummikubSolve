sonar.projectKey=jonasyr_RummikubSolve
sonar.organization=gitray-org

# Sources — backend as single root avoids __init__.py ambiguity in coverage resolution;
# test files auto-detected by naming convention (*.test.*, *.spec.*, __tests__/)
sonar.sources=backend,frontend/src

# Coverage report paths (generated during CI)
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions — keep tests out of source analysis; exclude build artefacts
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/migrations/**,backend/tests/**
sonar.coverage.exclusions=**/tests/**,**/__tests__/**,**/conftest.py

# Language-specific config
sonar.python.version=3.12
