name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonar:
    name: Coverage & SonarCloud scan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # required for SonarCloud PR decoration (posting comments)
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for blame annotations

      # --- Backend coverage ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Backend coverage (pytest-cov, skip slow)
        working-directory: backend
        run: pytest -m "not slow" --cov=solver --cov=api --cov-report=xml:coverage.xml

      # --- Frontend coverage ---
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend coverage (vitest)
        working-directory: frontend
        run: npm run test:coverage

      # --- SonarCloud scan ---
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
